<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background Circle (Teal) -->
  <circle cx="256" cy="256" r="256" fill="#1fb1ae"/>
  
  <!-- Content Area (White Rounded Square) -->
  <rect x="100" y="320" width="180" height="40" rx="4" fill="white" transform="rotate(-90 100 320)" opacity="0"/> <!-- Helper for alignment -->
  
  <rect x="110" y="330" width="292" height="360" rx="36" fill="white" transform="translate(0, -220)"/>
  
  <!-- Stylized T (Taka Symbol shape) -->
  <path d="M118 180h60v15h-60zM118 240h60v15h-60z" fill="#1fb1ae" />
  <path d="M118 180c0 100 40 140 80 140s80-40 80-140V180" fill="none" stroke="#1fb1ae" stroke-width="45" stroke-linecap="round" />
  
  <!-- Upward Arrow (Growth) -->
  <path d="M290 340l40-50 20 30 40-70" fill="none" stroke="#1fb1ae" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M375 240l25 25-10 15z" fill="#1fb1ae" />

  <!-- Text: SOMITI PRO -->
  <text x="256" y="145" font-family="Arial, sans-serif" font-weight="900" font-size="62" fill="white" text-anchor="middle" letter-spacing="1">SOMITI PRO</text>
  
  <!-- Text: MICRO-FINANCE -->
  <text x="256" y="390" font-family="Arial, sans-serif" font-weight="700" font-size="34" fill="white" text-anchor="middle" letter-spacing="2">MICRO-FINANCE</text>
</svg>
